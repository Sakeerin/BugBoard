services:
  mysql:
    image: mysql:8.0
    container_name: bugboard-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: bugboard
      MYSQL_DATABASE: bugboard
    ports:
      - "3306:3306"
    volumes:
      - bugboard-mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  bugboard-mysql-data:
